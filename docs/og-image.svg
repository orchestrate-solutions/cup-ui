<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo -->
  <rect x="60" y="60" width="80" height="80" rx="16" fill="#4fc3f7" opacity="0.15"/>
  <text x="100" y="118" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#4fc3f7" text-anchor="middle">c</text>
  <!-- Title -->
  <text x="160" y="112" font-family="system-ui,sans-serif" font-size="42" font-weight="700" fill="#e0e0e0">cup/core</text>
  <!-- Subtitle -->
  <text x="60" y="200" font-family="system-ui,sans-serif" font-size="32" fill="#b0bec5">Zero-Dependency Design System</text>
  <!-- Component chips -->
  <rect x="60" y="260" width="120" height="40" rx="8" fill="#4fc3f7" opacity="0.12"/>
  <text x="120" y="286" font-family="system-ui,sans-serif" font-size="16" fill="#4fc3f7" text-anchor="middle">25+ Components</text>
  <rect x="200" y="260" width="130" height="40" rx="8" fill="#66bb6a" opacity="0.12"/>
  <text x="265" y="286" font-family="system-ui,sans-serif" font-size="16" fill="#66bb6a" text-anchor="middle">CSS Design Tokens</text>
  <rect x="350" y="260" width="120" height="40" rx="8" fill="#ffa726" opacity="0.12"/>
  <text x="410" y="286" font-family="system-ui,sans-serif" font-size="16" fill="#ffa726" text-anchor="middle">Dual JS/WASM</text>
  <rect x="490" y="260" width="100" height="40" rx="8" fill="#ef5350" opacity="0.12"/>
  <text x="540" y="286" font-family="system-ui,sans-serif" font-size="16" fill="#ef5350" text-anchor="middle">WCAG AA</text>
  <!-- Component preview boxes -->
  <rect x="60" y="340" width="240" height="100" rx="12" fill="#16213e" stroke="#333" stroke-width="1"/>
  <text x="80" y="370" font-family="ui-monospace,monospace" font-size="13" fill="#b0bec5">&lt;cup-field&gt;</text>
  <rect x="80" y="385" width="200" height="32" rx="6" fill="#1a1a2e" stroke="#4fc3f7" stroke-width="1"/>
  <text x="92" y="406" font-family="system-ui,sans-serif" font-size="14" fill="#888">Enter text...</text>
  <rect x="320" y="340" width="240" height="100" rx="12" fill="#16213e" stroke="#333" stroke-width="1"/>
  <text x="340" y="370" font-family="ui-monospace,monospace" font-size="13" fill="#b0bec5">&lt;cup-button&gt;</text>
  <rect x="340" y="385" width="90" height="36" rx="8" fill="#4fc3f7"/>
  <text x="385" y="409" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#000" text-anchor="middle">Primary</text>
  <rect x="440" y="385" width="100" height="36" rx="8" fill="transparent" stroke="#b0bec5" stroke-width="1"/>
  <text x="490" y="409" font-family="system-ui,sans-serif" font-size="14" fill="#b0bec5" text-anchor="middle">Secondary</text>
  <rect x="580" y="340" width="240" height="100" rx="12" fill="#16213e" stroke="#333" stroke-width="1"/>
  <text x="600" y="370" font-family="ui-monospace,monospace" font-size="13" fill="#b0bec5">&lt;cup-toggle&gt;</text>
  <rect x="600" y="388" width="44" height="24" rx="12" fill="#4fc3f7"/>
  <circle cx="632" cy="400" r="9" fill="#fff"/>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#4fc3f7" opacity="0.08"/>
  <text x="60" y="616" font-family="system-ui,sans-serif" font-size="16" fill="#4fc3f7">github.com/orchestrate-solutions/cup</text>
  <text x="1140" y="616" font-family="system-ui,sans-serif" font-size="16" fill="#b0bec5" text-anchor="end">Apache-2.0</text>
</svg>
